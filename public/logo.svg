<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#161618"/>

  <!-- Whetstone base -->
  <rect x="72" y="338" width="368" height="68" rx="14" fill="#242428"/>
  <rect x="72" y="338" width="368" height="6" rx="3" fill="#4A90D9" opacity="0.45"/>

  <!-- Blade (diagonal line from lower-left to upper-right) -->
  <!-- Shadow/glow -->
  <line x1="128" y1="338" x2="400" y2="110" stroke="#1E3A5F" stroke-width="30" stroke-linecap="round"/>
  <!-- Blade body -->
  <line x1="128" y1="338" x2="400" y2="110" stroke="#4A90D9" stroke-width="20" stroke-linecap="round"/>
  <!-- Edge highlight -->
  <line x1="128" y1="338" x2="400" y2="110" stroke="#7AB8F0" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- Sharpening angle arc -->
  <path d="M 128 338 A 90 90 0 0 1 203 271" fill="none" stroke="#4A90D9" stroke-width="7" stroke-linecap="round" opacity="0.55"/>

  <!-- Angle degree dot -->
  <circle cx="215" cy="261" r="8" fill="#6AAAE8" opacity="0.8"/>
</svg>
